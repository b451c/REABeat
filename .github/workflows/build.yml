name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macOS-arm64
            artifact: reaper_reabeat-arm64.dylib
            cmake_flags: -DCMAKE_OSX_ARCHITECTURES=arm64
            ort_url: https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-osx-arm64-1.24.4.tgz

          - os: macos-14
            platform: macOS-x86_64
            artifact: reaper_reabeat-x86_64.dylib
            cmake_flags: -DCMAKE_OSX_ARCHITECTURES=x86_64 -DCMAKE_OSX_DEPLOYMENT_TARGET=10.15
            # ORT 1.16.3 is the last release that runs on macOS 10.15 (Catalina).
            # Later versions (1.17+) require macOS 11.0+; 1.20+ requires 13.3+.
            # Bump this when Catalina support is dropped.
            ort_url: https://github.com/microsoft/onnxruntime/releases/download/v1.16.3/onnxruntime-osx-x86_64-1.16.3.tgz

          - os: windows-latest
            platform: Windows-x64
            artifact: reaper_reabeat-x64.dll
            cmake_flags: -A x64
            ort_url: https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-win-x64-1.24.4.zip

          - os: ubuntu-22.04
            platform: Linux-x86_64
            artifact: reaper_reabeat-x86_64.so
            cmake_flags: ""
            ort_url: https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-linux-x64-1.24.4.tgz

          - os: ubuntu-22.04-arm
            platform: Linux-aarch64
            artifact: reaper_reabeat-aarch64.so
            cmake_flags: ""
            ort_url: https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-linux-aarch64-1.24.4.tgz

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download ONNX Runtime (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p vendor/onnxruntime /tmp/ort-extract
          curl -sL "${{ matrix.ort_url }}" -o /tmp/ort.tgz
          tar -xzf /tmp/ort.tgz -C /tmp/ort-extract
          # Archive layout differs by ORT version: 1.16.3 ships entries with a
          # leading "./" so --strip-components=1 leaves the version dir behind,
          # while 1.20+ omit it. Find the inner ORT dir and flatten regardless.
          ORT_INNER=$(find /tmp/ort-extract -mindepth 1 -maxdepth 2 -type d -name "onnxruntime-*" | head -1)
          if [ -z "$ORT_INNER" ]; then
            echo "ERROR: no onnxruntime-* directory found in archive"
            ls -la /tmp/ort-extract
            exit 1
          fi
          cp -R "$ORT_INNER"/* vendor/onnxruntime/
          rm -rf /tmp/ort-extract /tmp/ort.tgz

      - name: Download ONNX Runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "${{ matrix.ort_url }}" -OutFile ort.zip
          Expand-Archive ort.zip -DestinationPath ort_tmp
          $dir = Get-ChildItem ort_tmp -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path vendor/onnxruntime | Out-Null
          Copy-Item -Recurse "$($dir.FullName)/*" vendor/onnxruntime/

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfreetype6-dev libx11-dev libxrandr-dev libxcursor-dev libxinerama-dev libasound2-dev libwebkit2gtk-4.0-dev libcurl4-openssl-dev

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_flags }}

      - name: Build
        run: cmake --build build --config Release

      - name: Find artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $file = Get-ChildItem -Recurse build -Filter "${{ matrix.artifact }}" | Select-Object -First 1
          if ($file) { Copy-Item $file.FullName build/${{ matrix.artifact }} -ErrorAction SilentlyContinue }

      - name: Bundle ONNX Runtime (Unix)
        run: |
          # -maxdepth 1 stops find from descending into the .dSYM/ directory.
          # macOS ORT tarballs ship a DWARF file with the SAME name as the
          # real library at <lib>.dSYM/Contents/Resources/DWARF/<libname>;
          # without the depth cap, find matches both and the second cp wins
          # in undefined order. For 1.16.3 that produced a 7.5 MB dSYM file
          # being shipped as the runtime, which the plugin couldn't load.
          if [ "$RUNNER_OS" = "Linux" ]; then
            find vendor/onnxruntime/lib -maxdepth 1 -name "libonnxruntime.so.*.*.*" ! -type l \
              -exec cp {} "build/libonnxruntime.so.1-${{ matrix.platform }}" \;
          elif [ "$RUNNER_OS" = "macOS" ]; then
            find vendor/onnxruntime/lib -maxdepth 1 -name "libonnxruntime.*.*.*.dylib" ! -type l \
              -exec cp {} "build/libonnxruntime-${{ matrix.platform }}.dylib" \;
          fi
        shell: bash
        if: runner.os != 'Windows'

      - name: Bundle ONNX Runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "vendor\onnxruntime\lib\onnxruntime.dll" "build\onnxruntime.dll" -ErrorAction SilentlyContinue

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            build/${{ matrix.artifact }}
            build/libonnxruntime*
            build/onnxruntime.dll

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.dylib
            **/*.dll
            **/*.so
            **/libonnxruntime.so.1-*
          body: |
            ## ReaBeat ${{ github.ref_name }}

            Neural beat detection and tempo mapping for REAPER.

            ### Download

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `reaper_reabeat-arm64.dylib` |
            | macOS (Intel) | `reaper_reabeat-x86_64.dylib` |
            | Windows 64-bit | `reaper_reabeat-x64.dll` |
            | Linux 64-bit | `reaper_reabeat-x86_64.so` |

            ### Installation

            1. Download the binary for your platform
            2. Place it in REAPER's `UserPlugins` folder:
               - macOS: `~/Library/Application Support/REAPER/UserPlugins/`
               - Windows: `%APPDATA%\REAPER\UserPlugins\`
               - Linux: `~/.config/REAPER/UserPlugins/`
            3. Restart REAPER
            4. Extensions > ReaBeat

            On first detection, ReaBeat downloads the neural network model (~79MB).

            See [CHANGELOG](https://github.com/b451c/ReaBeat/blob/main/CHANGELOG.md) for details.

            ---

            [Ko-fi](https://ko-fi.com/quickmd) | [Buy Me a Coffee](https://buymeacoffee.com/bsroczynskh) | [PayPal](https://www.paypal.com/paypalme/b451c)
